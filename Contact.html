<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <script src="https://cdn.tailwindcss.com"></script> 
</head>
<body>
     <!-- Contact Section -->
        <section id="contact" class="py-20 flex items-center justify-center p-6 bg-white dark:bg-gray-900 [scroll-margin-top:5rem]">
            <div class="max-w-6xl mx-auto">
                <div class="text-center mb-16">
                    <h2 class="text-3xl font-bold text-gray-800 dark:text-white inline-block relative">
                        Contact Me
                        <span class="absolute bottom-0 left-0 w-full h-1 bg-[#F5A623]"></span>
                    </h2>
                    <p class="text-gray-600 dark:text-gray-400 mt-4 max-w-xl mx-auto">
                        Interested in working together? I'd love to hear from you
                    </p>
                </div>

                <div class="flex flex-col md:flex-row gap-6 md:gap-12 lg:gap-12">
                    <!-- Contact Form -->
                    <div class="md:w-3/5">
                        <h3 class="text-2xl font-bold text-gray-800 dark:text-white mb-6">Get In Touch</h3>
                        <form class="space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label for="name" class="block text-gray-700 dark:text-gray-300 mb-2 font-medium">Full Name</label>
                                    <input type="text" id="name" class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-[#F5A623]" placeholder="Aimee Ishimwe">
                                </div>
                                <div>
                                    <label for="email" class="block text-gray-700 dark:text-gray-300 mb-2 font-medium">Email Address</label>
                                    <input type="email" id="email" class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-[#F5A623]" placeholder="aimeishimwe25@gmail.com">
                                </div>
                            </div>
                            <div>
                                <label for="subject" class="block text-gray-700 dark:text-gray-300 mb-2 font-medium">Subject</label>
                                <input type="text" id="subject" class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-[#F5A623]" placeholder="your project ">
                            </div>
                            <div>
                                <label for="message" class="block text-gray-700 dark:text-gray-300 mb-2 font-medium">Message</label>
                                <textarea id="message" class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-[#F5A623]" rows="5" placeholder="Tell me about your project ..."></textarea>
                            </div>
                            <button type="submit" class="w-full md:w-auto bg-[#F5A623] text-white px-8 py-3 rounded-lg font-medium hover:bg-[#e69520] transition duration-300 ease-in-out transform hover:scale-105 shadow-md">
                                Send Message
                            </button>
                        </form>
                    </div>

                    <!-- Contact Information -->
                    <div class="md:w-2/5">
                        <div class="bg-gray-50 dark:bg-gray-800 p-4 sm:p-8 rounded-lg shadow-md">
                            <h3 class="text-2xl font-bold text-gray-800 dark:text-white mb-6">Contact Information</h3>
                            <address class="space-y-6 not-italic">
                                <div class="flex items-start">
                                    <div class="bg-[#F5A623] p-3 rounded-full text-white mr-4">
                                        <i class="fas fa-envelope"></i>
                                    </div>
                                    <div>
                                        <h4 class="font-semibold text-gray-800 dark:text-white">Email</h4>
                                        <a href="mailto:umwalimaureen25
                                        @example.com" class="text-gray-600 dark:text-gray-300 hover:text-[#F5A623] transition-colors">kiraboannet624@gmail.com</a>
                                    </div>
                                </div>
                                <div class="flex items-start">
                                    <div class="bg-[#F5A623] p-3 rounded-full text-white mr-4">
                                        <i class="fas fa-map-marker-alt"></i>
                                    </div>
                                    <div>
                                        <h4 class="font-semibold text-gray-800 dark:text-white">contact</h4>
                                        <p class="text-gray-600 dark:text-gray-300">+250784916085</p>
                                    </div>
                                </div>
                                <div class="flex items-start">
                                    <div class="bg-[#F5A623] p-3 rounded-full text-white mr-4">
                                        <i class="fas fa-clock"></i>
                                    </div>
                                    <div>
                                        <h4 class="font-semibold text-gray-800 dark:text-white"> location</h4>
                                        <p class="text-gray-600 dark:text-gray-300">Kigali, Rwanda</p>
                                    </div>
                                </div>
                            </address>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-gray-800 text-white py-4 text-center">
        <p>© 2025 Kirabo Annet. All Rights Reserved.</p>
        <p class="text-sm text-gray-400 mt-1">Last updated: <time datetime="2026-01-19">march15, 2026</time></p>
    </footer>
 
</body>
</html>
</section>
